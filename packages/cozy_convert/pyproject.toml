[project]
name = "cozy-convert"
version = "0.1.0"
description = "Cozy Creator's model ETL: hub ingest (HF + Civitai), dtype cast / quantization, repackage, and Tensorhub publish."
readme = "README.md"
license = "MIT"
authors = [
    { name = "Paul Fidika", email = "paul@fidika.com" }
]
keywords = ["ai", "ml", "model-conversion", "quantization", "huggingface", "cozy"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
requires-python = ">=3.11"
dependencies = [
    "gen-worker>=0.11.2,<0.12",
    "huggingface-hub>=0.26.0",
    "requests>=2.32.0",
    "msgspec>=0.18.6",
    "blake3>=1.0.0",
    "gguf>=0.10.0",
]

[project.urls]
Homepage = "https://github.com/cozy-creator/python-gen-worker"
Repository = "https://github.com/cozy-creator/python-gen-worker"
Issues = "https://github.com/cozy-creator/python-gen-worker/issues"

[project.optional-dependencies]
# torch/safetensors are required for any conversion that touches tensors
# (cast, quant, repackage, writer). Ingest + classify + publish run without.
torch = [
    "torch>=2.11.0",
    "safetensors>=0.7.0",
]
dev = [
    "pytest>=9.0.0",
    "mypy>=1.10.0",
    "ruff>=0.6.0",
    "torch>=2.11.0",
    "safetensors>=0.7.0",
    "transformers>=4.50.0",
    "accelerate>=1.0.0",
    "bitsandbytes>=0.45.0; sys_platform == 'linux'",
    "types-requests>=2.32.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cozy_convert"]

[tool.uv.sources]
gen-worker = { workspace = true }

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
no_implicit_optional = true
# The tenant-SDK modules moved verbatim from gen_worker.conversion carry the
# old package's mypy exemption (untyped defs). New modules (writer, classifier,
# ingest, hub, clone, publish) are typed.
disallow_untyped_defs = false

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
ignore = ["E402"]

[tool.ruff.lint.per-file-ignores]
"**/__init__.py" = ["F401", "F403"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = ["integration: network tests against real tiny HF models"]
