schema_version = 1

name = "sd15"
# Python import path used for function discovery (not a Docker ENTRYPOINT).
main = "sd15.main"

[models]
sd15 = { ref = "stable-diffusion-v1-5/stable-diffusion-v1-5", dtypes = ["fp16", "bf16"] }
sd15_fp8 = { ref = "stable-diffusion-v1-5/stable-diffusion-v1-5", dtypes = ["fp8"] }
sd15_int8 = { ref = "stable-diffusion-v1-5/stable-diffusion-v1-5", dtypes = ["int8"] }
sd15_int4 = { ref = "stable-diffusion-v1-5/stable-diffusion-v1-5", dtypes = ["int4"] }

[host.requirements]
# If cuda is set, the platform treats this worker as requiring an NVIDIA GPU.
cuda = "12.6"

[resources]
vram_gb = 8
ram_gb = 16
cpu_cores = 4
disk_gb = 30
max_inflight_requests = 1
