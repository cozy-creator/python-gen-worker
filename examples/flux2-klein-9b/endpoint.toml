schema_version = 1

name = "flux.2-klein-9b"
# Python import path used for function discovery (not a Docker ENTRYPOINT).
main = "flux2_klein_9b.main"

[models]
flux2-klein-9b-base = { ref = "black-forest-labs/flux.2-klein-9b-base", dtypes = ["bf16"] }
flux2-klein-9b-turbo = { ref = "black-forest-labs/flux.2-klein-9b-turbo", dtypes = ["bf16"] }
flux2-klein-9b-base_fp8 = { ref = "black-forest-labs/flux.2-klein-9b-base", dtypes = ["fp8"] }
flux2-klein-9b-turbo_fp8 = { ref = "black-forest-labs/flux.2-klein-9b-turbo", dtypes = ["fp8"] }
flux2-klein-9b-base_nvfp4 = { ref = "black-forest-labs/flux.2-klein-9b-base", dtypes = ["nvfp4"] }
flux2-klein-9b-turbo_nvfp4 = { ref = "black-forest-labs/flux.2-klein-9b-turbo", dtypes = ["nvfp4"] }

[host.requirements]
# If cuda is set, the platform treats this worker as requiring an NVIDIA GPU.
cuda = "12.8"

[resources]
vram_gb = 24
ram_gb = 32
cpu_cores = 8
disk_gb = 50
max_inflight_requests = 1
