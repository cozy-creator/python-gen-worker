schema_version = 1
main = "medasr_transcribe.main"

# Model bindings live in @inference(models={...}) in main.py. The
# per-function Resources struct on the decorator declares hardware needs.

[[build.profiles]]
name = "cu128"
accelerator = "cuda"
cuda = "12.8"
cuda_min = "12.8"
compute_capabilities = [">=8.0"]
python = "3.12"
torch = "~=2.11.0"
image_kind = "runtime"
