schema_version = 1

name = "flux.2-klein-4b"
# Python import path used for function discovery (not a Docker ENTRYPOINT).
main = "flux2_klein_4b.main"

[models]
flux2-klein-4b-base = { ref = "black-forest-labs/flux.2-klein-4b-base", attributes = { dtype = ["bf16"] } }
flux2-klein-4b-turbo = { ref = "black-forest-labs/flux.2-klein-4b-turbo", attributes = { dtype = ["bf16"] } }
flux2-klein-4b-base_fp8 = { ref = "black-forest-labs/flux.2-klein-4b-base", attributes = { dtype = ["fp8"] } }
flux2-klein-4b-turbo_fp8 = { ref = "black-forest-labs/flux.2-klein-4b-turbo", attributes = { dtype = ["fp8"] } }
flux2-klein-4b-base_nvfp4 = { ref = "black-forest-labs/flux.2-klein-4b-base", attributes = { dtype = ["nvfp4"] } }
flux2-klein-4b-turbo_nvfp4 = { ref = "black-forest-labs/flux.2-klein-4b-turbo", attributes = { dtype = ["nvfp4"] } }

[host.requirements]
# If cuda is set, the platform treats this worker as requiring an NVIDIA GPU.
cuda = "12.8"

[resources]
vram_gb = 24
ram_gb = 32
cpu_cores = 8
disk_gb = 50
max_inflight_requests = 1
