name: GPU CI

# Ephemeral RunPod 4090 lane (gw#421). Security model: see .github/gpu-runner/README.md.
# Triggers are deliberately narrow — never bare `pull_request`, never `pull_request_target`.
on:
  schedule:
    - cron: "17 9 * * *" # nightly
  push:
    branches: [master]
  pull_request:
    types: [labeled] # runs only when a maintainer applies the `gpu` label
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gpu-ci-${{ github.ref }}
  cancel-in-progress: false

env:
  POD_NAME: gw-gpu-ci-${{ github.run_id }}

jobs:
  bootstrap:
    name: Boot ephemeral 4090 runner
    # Label-gated for PRs; same-repo branches only (fork PRs never reach the runner
    # and never see secrets — maintainers push the branch to this repo instead).
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.label.name == 'gpu' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Mint single-use runner registration token
        id: mint
        env:
          GH_ADMIN_TOKEN: ${{ secrets.GH_RUNNER_ADMIN_TOKEN }}
        run: |
          tok=$(curl -sf -X POST \
            -H "Authorization: Bearer $GH_ADMIN_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runners/registration-token" \
            | jq -er .token)
          echo "::add-mask::$tok"
          echo "token=$tok" >> "$GITHUB_OUTPUT"

      - name: Create RunPod pod (on-demand RTX 4090)
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNNER_TOKEN: ${{ steps.mint.outputs.token }}
        run: |
          # The pod env carries ONLY the single-use registration token — never the RunPod API key.
          body=$(jq -n \
            --arg name "$POD_NAME" \
            --arg image "ghcr.io/${GITHUB_REPOSITORY_OWNER}/gw-gpu-runner:latest" \
            --arg repo_url "https://github.com/${GITHUB_REPOSITORY}" \
            --arg token "$RUNNER_TOKEN" \
            '{
              name: $name,
              imageName: $image,
              gpuTypeIds: ["NVIDIA GeForce RTX 4090"],
              gpuCount: 1,
              cloudType: "COMMUNITY",
              interruptible: false,
              allowedCudaVersions: ["12.8", "12.9", "13.0"],
              containerDiskInGb: 60,
              volumeInGb: 0,
              ports: [],
              env: {
                REPO_URL: $repo_url,
                RUNNER_TOKEN: $token,
                RUNNER_NAME: $name,
                RUNNER_LABELS: "gpu-4090",
                TTL_MINUTES: "45"
              }
            }')
          # Capacity misses return 500 ("machine does not have the resources") —
          # retry across cloud types instead of dying on the first attempt.
          pod=""
          for attempt in 1 2 3; do
            for cloud in COMMUNITY SECURE; do
              try=$(echo "$body" | jq --arg c "$cloud" '.cloudType = $c')
              resp=$(curl -s -w '\n%{http_code}' -X POST "https://rest.runpod.io/v1/pods" \
                -H "Authorization: Bearer $RUNPOD_API_KEY" \
                -H "Content-Type: application/json" \
                -d "$try" || true)
              code=${resp##*$'\n'}; json=${resp%$'\n'*}
              if [ "$code" = "200" ] || [ "$code" = "201" ]; then pod="$json"; break 2; fi
              echo "create attempt $attempt ($cloud) -> HTTP $code: $(echo "$json" | jq -r '.error // .' 2>/dev/null | head -c 200)"
              sleep 20
            done
          done
          [ -n "$pod" ] || { echo "::error::no 4090 capacity after 6 attempts (COMMUNITY+SECURE x3)"; exit 1; }
          echo "created pod $(echo "$pod" | jq -r .id) at \$$(echo "$pod" | jq -r .costPerHr)/hr ($(echo "$pod" | jq -r '.machine.location // empty'))"

      - name: Wait for runner to come online
        env:
          GH_ADMIN_TOKEN: ${{ secrets.GH_RUNNER_ADMIN_TOKEN }}
        run: |
          for i in $(seq 1 60); do
            status=$(curl -sf \
              -H "Authorization: Bearer $GH_ADMIN_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runners" \
              | jq -r --arg n "$POD_NAME" '.runners[] | select(.name == $n) | .status')
            [ "$status" = "online" ] && { echo "runner online"; exit 0; }
            echo "waiting for runner ($i/60, status=${status:-absent})..."
            sleep 10
          done
          echo "runner never came online; sweep will terminate the pod" >&2
          exit 1

  test:
    name: torch suite on 4090
    needs: bootstrap
    runs-on: [self-hosted, gpu-4090]
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: GPU sanity
        run: nvidia-smi

      - name: Sync deps (cu129 lock)
        id: sync
        # Pin the interpreter to the fleet floor: without this, a runner whose
        # baked python predates requires-python makes uv download the newest
        # CPython (3.14 incident, gw#502).
        run: uv sync --python 3.12 --extra dev --extra torch --extra images

      # triton >=3.7 JIT-compiles launcher stubs at runtime and needs a host
      # C compiler. Baked into the runner image; the apt fallback covers pods
      # booted from a pre-gcc image (rebuild races this same push).
      - name: Ensure C compiler (triton JIT)
        run: |
          command -v cc >/dev/null 2>&1 || {
            apt-get update -qq
            apt-get install -y -qq --no-install-recommends gcc libc6-dev
          }

      - name: Run tests
        run: uv run --extra dev --extra torch --extra images pytest tests/ -q --junitxml=gpu-junit.xml

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-test-results
          path: gpu-junit.xml
          if-no-files-found: ignore

      # Real image-generation smoke: FLUX.2-klein-4B turbo (ungated, ~16GB)
      # through load_from_pretrained + place_pipeline, tripwire-gated.
      # diffusers/transformers are endpoint deps, not gen-worker deps — installed
      # into the synced venv (torch stays the cu129 lock build; pins mirror the
      # klein endpoint); --no-sync keeps uv run from pruning them.
      # Independent signal: runs whenever deps synced, even if the suite failed
      # (a flaky unit test must not hide "does the product make pictures").
      - name: Image-generation smoke (FLUX.2-klein-4B turbo)
        if: ${{ !cancelled() && steps.sync.outcome == 'success' }}
        env:
          GEN_WORKER_GPU_SMOKE: "1"
          GEN_WORKER_SMOKE_OUT: ${{ github.workspace }}/smoke-out
        run: |
          uv pip install "diffusers>=0.39,<0.40" "transformers>=5.13,<6" \
            accelerate sentencepiece numpy
          uv run --no-sync pytest tests/test_gpu_generation_smoke.py -q -rs -s

      - name: Upload generated image
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-image
          path: smoke-out/
          if-no-files-found: ignore

  sweep:
    name: Terminate pod
    needs: [bootstrap, test]
    if: always() && needs.bootstrap.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Terminate this run's pod (+ stale gw-gpu-ci leaks)
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          list() {
            curl -sf -H "Authorization: Bearer $RUNPOD_API_KEY" "https://rest.runpod.io/v1/pods"
          }
          # This run's pod by exact name, plus any gw-gpu-ci-* pod older than 2h
          # (leaked by a cancelled/stuck run). Never touches other pods.
          # createdAt is Go-format ("2026-07-09 22:16:07.641 +0000 UTC"); prefix compare works.
          cutoff=$(date -u -d '2 hours ago' '+%Y-%m-%d %H:%M:%S')
          ids=$(list | jq -r --arg n "$POD_NAME" --arg cutoff "$cutoff" \
            '.[] | select(.name == $n or ((.name | test("^gw-gpu-ci-[0-9]+$")) and .createdAt < $cutoff)) | .id')
          for id in $ids; do
            echo "terminating pod $id"
            curl -sf -X DELETE -H "Authorization: Bearer $RUNPOD_API_KEY" \
              "https://rest.runpod.io/v1/pods/$id" || true
          done
          sleep 5
          leftover=$(list | jq -r --arg n "$POD_NAME" '.[] | select(.name == $n) | .id')
          if [ -n "$leftover" ]; then
            echo "pod(s) still present after DELETE: $leftover" >&2
            exit 1
          fi
          echo "sweep clean"
