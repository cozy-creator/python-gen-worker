name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev

      # No mypy step: 88 errors of continue-on-error type debt made a job that
      # could never fail — red CI must mean something (#356). Type checking
      # stays in the local loop via `task lint`; re-add a gating step once the
      # worker-core rewrite (#365) lands mypy-clean.
      - name: Lint
        continue-on-error: true  # Lint debt (mostly worker.py, being rewritten) — visible in logs, doesn't block CI.
        run: uv run ruff check src/gen_worker

      # GATING (no continue-on-error): a bare HTTP call site is the gw#456
      # forever-hang reintroduced. hf_hub network use goes through
      # gen_worker.net.hf(); every httpx/requests call carries a timeout.
      - name: HTTP timeout guard (gw#467)
        run: uv run python scripts/lint_http_timeouts.py

      - name: Run tests
        run: uv run pytest tests/ -v

      - name: Build package
        run: uv build
