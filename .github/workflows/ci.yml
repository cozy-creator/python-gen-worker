name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      # GATING (gw#497): the tree is mypy-clean (zeroed 2026-07-11 — the
      # #356-era 88-error debt is gone; no baseline, no continue-on-error).
      # A new mypy error is a new seam: fix it, don't ignore it.
      - name: Type check (mypy)
        run: uv run mypy src/gen_worker

      - name: Lint
        continue-on-error: true  # Lint debt (mostly worker.py, being rewritten) — visible in logs, doesn't block CI.
        run: uv run ruff check src/gen_worker

      # GATING (no continue-on-error): a bare HTTP call site is the gw#456
      # forever-hang reintroduced. hf_hub network use goes through
      # gen_worker.net.hf(); every httpx/requests call carries a timeout.
      - name: HTTP timeout guard (gw#467)
        run: uv run python scripts/lint_http_timeouts.py

      # Pinned CPU build so the gw#402 llama.cpp runtime tests exercise the
      # real llama-server codepath (tests skip when the binary is absent).
      - name: Install llama-server (pinned, CPU)
        run: |
          curl -sSL --retry 3 -o /tmp/llama.tgz \
            https://github.com/ggml-org/llama.cpp/releases/download/b9964/llama-b9964-bin-ubuntu-x64.tar.gz
          tar xzf /tmp/llama.tgz -C "$HOME"
          echo "$HOME/llama-b9964" >> "$GITHUB_PATH"
          echo "LD_LIBRARY_PATH=$HOME/llama-b9964" >> "$GITHUB_ENV"

      - name: Run tests
        run: uv run pytest tests/ -v

      - name: Build package
        run: uv build
