syntax = "proto3";

package cozy.scheduler;

option go_package = "github.com/cozy-creator/tensorhub/internal/orchestrator/grpc/pb/workerscheduler;workerscheduler";

// ============================================================================
// Worker <-> Orchestrator wire protocol.
//
// ONE bidi stream: WorkerScheduler.Connect. The worker sends WorkerMessage
// envelopes; the orchestrator sends SchedulerMessage envelopes.
//
// Identity is per CONNECTION: the worker attaches `authorization: Bearer
// <worker JWT>` gRPC metadata when dialing. JWT claims (sub = worker_id,
// release_id) are authoritative; Hello echoes them only for the no-auth dev
// mode and for cross-checking.
//
// Liveness is a 3-layer contract (th#965, CONTRACT.md §3): transport
// keepalive (dead peer), a periodic app-level StateDelta beat emitted from
// the worker's control loop (hung process), and the hub-side obligation
// invariant (loading function with no open activity = stalled).
//
// Fencing is a single `attempt` integer bumped only by the orchestrator.
//
// Full field-by-field semantics: CONTRACT.md next to this file.
// ============================================================================

// Exactly one live protocol version. Hello.protocol_version must equal
// PROTOCOL_VERSION_CURRENT or the orchestrator closes the stream with
// FAILED_PRECONDITION. No minor versions, no feature gates, no negotiation.
enum ProtocolVersion {
  PROTOCOL_VERSION_UNSPECIFIED = 0;
  PROTOCOL_VERSION_CURRENT     = 4;
}

service WorkerScheduler {
  rpc Connect (stream WorkerMessage) returns (stream SchedulerMessage);
}

// ---------------------------------------------------------------------------
// Envelopes
// ---------------------------------------------------------------------------

message WorkerMessage {
  oneof msg {
    Hello              hello               = 1;
    StateDelta         state_delta         = 2;
    JobAccepted        job_accepted        = 3;
    JobResult          job_result          = 4;
    JobProgress        job_progress        = 5;
    ModelEvent         model_event         = 6;
    FnUnavailable      fn_unavailable      = 7;
    FnDegraded         fn_degraded         = 8;
    ActivityUpdate     activity_update     = 9;
    // gw#619/th#988: sent INSTEAD OF Hello, as the only message on the
    // stream, when the worker's boot-time hardware probe (gen_worker
    // cuda_probe, gw#529) fails. Authenticated identically to Hello (worker
    // JWT in Connect metadata, checked before the first message is read);
    // the worker exits immediately after this send (or after a bounded
    // retry budget if the hub is unreachable/rejects the connection).
    HardwareUnsuitable hardware_unsuitable = 10;
  }
}

message SchedulerMessage {
  oneof msg {
    HelloAck     hello_ack     = 1;
    RunJob       run_job       = 2;
    CancelJob    cancel_job    = 3;
    ModelOp      model_op      = 4;
    Drain        drain         = 5;
    TokenRefresh token_refresh = 6;
  }
}

// ---------------------------------------------------------------------------
// Connection lifecycle
// ---------------------------------------------------------------------------

// First message on every stream, worker -> orchestrator. Full snapshot of
// static resources, dynamic state, model residency, and in-flight work.
message Hello {
  ProtocolVersion protocol_version = 1;
  string worker_id  = 2; // must equal JWT `sub` when auth is enabled
  string release_id = 3; // must equal JWT `release_id` claim when auth is enabled
  WorkerResources resources = 4;   // static hardware/build identity
  StateDelta      state     = 5;   // initial dynamic state snapshot
  repeated ModelResidency models = 6; // full residency snapshot (reconcile baseline)
  repeated InFlightJob in_flight = 7; // running + completed-with-unshipped-result
  // th#965 layer 2: the worker's promised heartbeat cadence. A worker that
  // declares it MUST re-send StateDelta at least this often in EVERY state
  // (idle, loading, serving, mid-activity); K consecutive misses and the hub
  // declares the worker dead (worker_heartbeat_lost). 0 = no promise: the
  // worker is never heartbeat-reaped (pre-th#965 builds).
  uint64 heartbeat_interval_ms = 8;
}

// Static per-boot facts. Sent once in Hello; never updated mid-connection.
message WorkerResources {
  int32  gpu_count        = 1;
  int64  vram_total_bytes = 2; // total VRAM across GPUs
  string gpu_name         = 3; // e.g. "NVIDIA GeForce RTX 4090"
  string gpu_sm           = 4; // compute capability, e.g. "89"
  repeated string installed_libs = 5; // e.g. "torchao"
  string image_digest     = 6; // docker image sha256
  string git_commit       = 7;
  string instance_id      = 8; // cloud provider instance id (e.g. runpod pod id)

  // gw#550: one-shot boot host-quality measurement. Zeros = axis not
  // measurable (CPU-only build, probe failure). Additive: old orchestrators
  // ignore it; old workers send it unset.
  HostCanary host_canary  = 9;
  // Exact runtime evidence used to select torch.compile cells. Full version
  // (for example 2.13.0+cu130); consumers compare the major.minor key while
  // artifact metadata remains responsible for stricter compatibility checks.
  string torch_version = 10;
  // gw#587/th#910: this worker's gen-worker library version (for example
  // "0.39.0"). Additive: old workers send it unset; the hub's self-mint cell
  // publish attestation FAILS CLOSED on the gen_worker axis when absent —
  // which is harmless for old workers, because they never call the publish
  // route at all.
  string gen_worker_version = 11;
}

// Worker -> orchestrator: this worker's boot-time hardware suitability probe
// failed and it is reporting WHY before it exits (gw#619/th#988), instead of
// dying silently pre-hello (the th#986/gw#618 blindness — a pod that never
// says hello left the orchestrator with zero attributable evidence). Sent as
// the ONLY message on a Connect stream, in place of Hello; the orchestrator
// persists it as a pod_events row and closes the stream (no reply message —
// the worker owns exiting on its own timeline after the send completes).
message HardwareUnsuitable {
  string worker_id  = 1; // must equal JWT `sub` when auth is enabled, as Hello
  string release_id = 2; // must equal JWT `release_id` claim when auth is enabled
  // Typed probe-failure class, derived by the worker from its own probe
  // result — never free-form. Vocabulary: torch_unavailable |
  // cuda_unavailable | driver_too_old | cuda_error | unknown.
  string reason_class = 3;
  string detail       = 4; // the probe's raw human-readable reason, verbatim
  // Machine-visible context for reschedule/blacklist decisions. Read
  // independently of a working CUDA runtime (nvidia-smi/NVML, not
  // torch.cuda) so a "driver too old" report still carries real driver/gpu
  // identity — exactly the evidence a broken CUDA runtime cannot self-report.
  string driver_version     = 5; // nvidia-smi/NVML driver version, "" if unread
  string gpu_name           = 6;
  string torch_version      = 7;
  string torch_cuda_version = 8; // torch.version.cuda (the build's CUDA runtime)
  string gen_worker_version = 9;
  string image_digest       = 10; // docker image sha256
  string instance_id        = 11; // cloud provider instance id (e.g. runpod pod id)
  int64  reported_at_unix_ms = 12; // worker clock, informational
}

// Boot host canary (gw#550): the host properties the CPU-bound video tail
// depends on (ie#484: 4-10x decode/encode spread at identical GPU step-ms).
// Measured once per process in a bounded ~1.5 s before the first Hello.
message HostCanary {
  double memcpy_gbps     = 1; // host-RAM copy bandwidth, 256 MiB buffer
  double h2d_gbps        = 2; // pinned host->device PCIe bandwidth
  double d2h_gbps        = 3; // pinned device->host PCIe bandwidth
  bool   pinned_alloc_ok = 4; // cudaHostAlloc of the staging buffer worked
  double cpu_single_mbps = 5; // sha256 throughput, one thread
  double cpu_multi_mbps  = 6; // sha256 throughput, min(vcpus,16) threads
  int32  vcpus           = 7; // os.cpu_count() as seen in the container
  double ram_total_gb    = 8; // cgroup-capped host RAM total
  int64  duration_ms     = 9; // canary wall time (self-audit)
}

message ModelResidency {
  string ref = 1;              // canonical model ref string
  ResidencyTier tier = 2;      // highest tier the model currently occupies
  int64 vram_bytes = 3;        // measured footprint; set when tier = VRAM, else 0
  // Exact immutable bytes and the DesiredResidency generation that caused
  // their materialization. Both are protocol-v4 evidence: legacy
  // workers leave them zero/empty, which means identity is unknown rather
  // than inferred from the mutable ref.
  string snapshot_digest = 4;
  uint64 residency_generation = 5;
}

enum ResidencyTier {
  RESIDENCY_TIER_UNSPECIFIED = 0;
  RESIDENCY_TIER_DISK        = 1;
  RESIDENCY_TIER_RAM         = 2;
  RESIDENCY_TIER_VRAM        = 3;
}

message InFlightJob {
  string request_id = 1;
  int64  attempt    = 2;
}

// Orchestrator -> worker reply to Hello. Also re-sent mid-connection whenever
// the release config changes (full-replace semantics).
message HelloAck {
  ProtocolVersion protocol_version = 1; // orchestrator's version, for symmetric validation
  string file_base_url = 2;  // tensorhub base URL for capability-token HTTP calls (uploads, blob refs)
  repeated string keep = 3;  // legacy v2 field; ignored by protocol v4 workers
  // th#697 precision ladder: per-model flavor resolutions for THIS worker's
  // card. The worker applies each entry to bindings whose wire ref equals
  // `ref` (a bare declared ref): download/load `resolved_ref` and apply the
  // `cast` transform at load. Full-replace with the ack. Additive: old
  // workers ignore it and load their declared bindings.
  repeated ModelResolution resolutions = 4;
  // Full-replace desired model residency for this worker (protocol v4).
  DesiredResidency desired_residency = 5;
}

// Declarative worker model state. Lists are ordered by orchestrator priority;
// snapshots cover every disk/hot ref the worker may need.
message DesiredResidency {
  uint64 generation = 1;
  repeated string disk_refs = 2;
  repeated DesiredInstance hot = 3;
  map<string, Snapshot> snapshots = 4;
  // th#1087/th#1085: hub-authoritative desired state is the PAIR
  // (release_id, config_generation). config_generation is the release's
  // mutable-config counter — distinct from `generation`, the per-worker
  // transport sequence number above. The worker echoes the config gen it
  // loaded via StateDelta.observed_config_generation.
  string release_id = 5;
  uint64 config_generation = 6;
}

// One complete runnable endpoint instance. `models` is the same complete
// slot-to-ref binding set carried by RunJob.
message DesiredInstance {
  string function_name = 1;
  repeated ModelBinding models = 2;
}

// One precision-ladder resolution (th#697): declared bare ref -> the concrete
// flavored ref (and/or load-time cast) the orchestrator picked for the
// worker's card.
message ModelResolution {
  string ref          = 1; // declared bare ref (canonical grammar, no #flavor)
  string resolved_ref = 2; // concrete ref to download + load (may carry #flavor)
  string cast         = 3; // load-time transform: "" | "fp8"
  // th#913: concrete execution-lane descriptor for this pick (e.g.
  // "fp8-w8a8-dynamic+compiled"). "" = unspecified (worker's own policy,
  // pre-lane behavior). Additive: old workers ignore it.
  string lane         = 4;
}

// Worker -> orchestrator dynamic state. FULL-REPLACE snapshot of every field.
// Sent when a field changed (edge-triggered) AND on the periodic heartbeat
// tick (th#965 layer 2): every Hello.heartbeat_interval_ms the worker's
// control loop re-sends the current snapshot even when unchanged — receipt
// is the app-level liveness beat the hub timestamps.
message StateDelta {
  WorkerPhase phase = 1;
  repeated string available_functions = 2; // dispatchable now
  repeated string loading_functions   = 3; // present but models still materializing
  int64 free_vram_bytes = 4; // measured free VRAM; sent on material change
  // Jobs past the decode->finalize handoff (gw#516): GPU slot terminally
  // released, encode/upload tail still running, JobResult not yet shipped.
  // Drain/retire must wait for these — GPU-idle alone is NOT work-idle.
  // Additive: old workers never set it; old orchestrators ignore it.
  int32 finalizing_jobs = 5;
  // Latest desired-residency generation accepted by this worker. This is
  // observation, not convergence; ModelEvent reports best-effort outcomes.
  uint64 observed_residency_generation = 6;
  // Exact READY live pipeline objects eligible for compile-cell adoption/
  // dispatch. Full-replace with every StateDelta; object-level readiness is
  // independent of aggregate phase. A vacated/replaced object disappears
  // before its successor can be addressed.
  repeated CompileTarget compile_targets = 7;
  // th#883 pull-by-key (gw#581): every cell key this worker's runtime could
  // consume right now — candidate keys computed pre-load from endpoint
  // declarations, narrowed to the exact per-target keys once objects are
  // live. Full-replace. Store-lookup hints ONLY (boot attach rides these);
  // forge demand comes exclusively from compile_targets' exact keys.
  repeated CellLookup cell_lookups = 8;
  // th#962/pgw#610: MEASURED per-tier disk telemetry. Present in every
  // StateDelta (and thus in Hello.state). The hub budgets residency plans
  // against these measured numbers only; release-declared disk sizes are
  // pod-creation priors, never a planning budget.
  DiskUsageReport disk_usage = 9;
  // th#1087/th#1085: the config generation this worker last loaded
  // (DesiredResidency.config_generation echo) — config staleness is
  // per-worker visible state, not inference. Additive: old workers send 0.
  uint64 observed_config_generation = 12;
}

// th#962/pgw#610: storage tiers a worker measures. CONTAINER is the pod-local
// disk holding the CAS root (the only tier residency bytes land on, th#850);
// VOLUME is the attached provider volume used as a fill source; NFS is a
// shared datacenter cache mount when one is present.
enum StorageTier {
  STORAGE_TIER_UNSPECIFIED = 0;
  STORAGE_TIER_CONTAINER   = 1;
  STORAGE_TIER_VOLUME      = 2;
  STORAGE_TIER_NFS         = 3;
}

// One measured mount point (statvfs on the real path, never a declared size).
message StorageTierUsage {
  StorageTier tier  = 1;
  string mount_path = 2;
  int64 total_bytes = 3;
  int64 free_bytes  = 4;
  int64 used_bytes  = 5;
  // Bytes of ref-index entries on this tier that are inactive AND not in the
  // current desired set — exactly the disk-GC LRU's eligible set, i.e. the
  // evictions the hub may cause without touching live or desired work.
  int64 reclaimable_bytes = 6;
}

// Measured disk capacity snapshot. capacity_generation is monotonic within
// one worker process and bumps only when the measured shape materially
// changes (quantized free space, reclaimable set, tier layout). The hub
// clears an insufficient-disk target failure ONLY on an observed EVICTED
// event or a generation change — never merely because it edited desired
// state.
message DiskUsageReport {
  repeated StorageTierUsage tiers = 1;
  uint64 capacity_generation = 2;
}

// One worker-computed cell identity the hub may look up in its store. The
// hub never derives compatibility from the axes; they parameterize a forge
// mint (SKU pin, lockstep image) and operator diagnostics only.
message CellLookup {
  string family = 1;
  string cell_key = 2; // "ck1-<sha256hex>", computed by gen_worker.cell_key
}

// One exact live pipeline object. incarnation_id is opaque, worker-minted,
// scoped to the live object/session, and changes on setup/replacement; never
// infer it from family/ref/function.
message CompileTarget {
  string incarnation_id = 1;
  string family = 2;
  // Raw worker runtime vocabulary: "" | "fp8-hooks" | "w8a8", optionally
  // with the declared LoRA bucket suffix. Only compile-cell flavor identity
  // canonicalizes fp8-hooks to the token w8a16.
  string pipeline_weight_lane = 3;
  int32 lora_bucket = 4;
  string contract_digest = 5;
  // Current exact compiled state: empty together for eager/unavailable;
  // nonempty together only after wrap+warmup proof. Mandatory W8A8 dispatch
  // fails closed while these are empty or its exact identity is quarantined.
  string active_compile_ref = 6;
  string active_compile_snapshot_digest = 7;
  // Canonical sorted worker-proven aliases that address this exact target;
  // an omitted alias has no target proof even if it shares endpoint config.
  repeated string function_names = 8;
  // Canonical sorted exact immutable load-time bindings owned by this target.
  // This may be a strict subset of the function's/RunJob's setup bindings.
  repeated CompileTargetBinding model_bindings = 9;
  // th#883 pull-by-key (gw#581): the exact cell key this live object's
  // runtime computed for itself (gen_worker.cell_key — the ONE compatibility
  // brain). The hub serves a stored cell by this key or records demand for
  // the forge; it never derives compatibility hub-side. Empty when the
  // runtime cannot state a required axis.
  string requested_cell_key = 10;
  // The requested key's axes, verbatim: forge mint parameters (SKU pin,
  // torch, image digest) and diagnostics only — never hub-side selection.
  map<string, string> requested_cell_axes = 11;
}

message CompileTargetBinding {
  string slot = 1;
  string ref = 2;
  string snapshot_digest = 3;
}

enum WorkerPhase {
  WORKER_PHASE_UNSPECIFIED        = 0;
  WORKER_PHASE_BOOTING            = 1;
  WORKER_PHASE_DOWNLOADING_MODELS = 2;
  WORKER_PHASE_LOADING_PIPELINES  = 3;
  WORKER_PHASE_WARMING            = 4; // torch.compile graph capture / cache warmup
  WORKER_PHASE_READY              = 5;
  WORKER_PHASE_ERROR              = 6;
}

// ---------------------------------------------------------------------------
// Jobs
// ---------------------------------------------------------------------------

// Orchestrator -> worker job dispatch. Retransmitted (same attempt) until the
// worker answers with JobAccepted or a JobResult.
message RunJob {
  string request_id = 1;
  int64  attempt    = 2; // fencing token; bumped by the orchestrator on every (re)queue
  string function_name = 3;
  bytes  input_payload = 4; // canonical MessagePack input; stored Asset refs remain opaque
  int64  timeout_ms = 5;    // execution deadline; 0 = no explicit timeout
  string tenant  = 6;    // invoking owner (org/user slug)
  string invoker_id = 7;    // surfaced read-only as ctx.invoker_id
  string capability_token = 8; // per-job worker capability token for tensorhub HTTP calls
  OutputMode output_mode = 9;  // client's inline-vs-url preference for media outputs
  ResolvedCompute compute = 10;
  repeated ModelBinding models = 11; // slot -> ref bindings resolved by the orchestrator
  // Presigned snapshots keyed by canonical ref. Ordinary warm-local bindings
  // may be omitted; required_compile retains every exact model digest plus the
  // selected cell so the worker can revalidate immutable execution identity.
  map<string, Snapshot> snapshots = 12;
  // Unique exact current-state fence selected by Tensorhub. Multiple
  // applicable targets fail closed. Mandatory for W8A8; when present on any
  // lane the worker validates before setup/mutation and
  // immediately before execution so replacement or causal runtime revocation
  // returns typed RETRYABLE without GPU work.
  RequiredCompileExecution required_compile = 13;
  // th#913/gw#596: hub-resolved execution lane for THIS request — a concrete
  // descriptor ("fp8-w8a8-dynamic+compiled") or a coarse family
  // ("bf16"|"fp8"|"4bit") the worker expands via its ladder twin. "" = no
  // instruction (worker's own policy). A worker that cannot serve the named
  // lane answers a typed refusal naming it — never a silent fallback.
  string lane = 14;
  // Ordered, credential-free stored inputs authorized at submit. The worker
  // resolves fresh transport URLs for the exact request+attempt capability.
  repeated InputAsset input_assets = 15;
  // th#1087: the config generation this job was dispatched at. In-flight
  // jobs finish on their dispatched generation; a gen bump never rewrites
  // a running job.
  uint64 config_generation = 16;
  // th#1087 class 1: effective declared-parameter values for THIS function,
  // msgpack map name -> value. Surfaced read-only as ctx.config; workers
  // never cache them.
  bytes config_params = 17;
}

message InputAsset {
  string asset_id = 1;
  string source_ref = 2;
  string blake3 = 3;
  int64 size_bytes = 4;
  string kind = 5;
  string mime_type = 6;
}

message RequiredCompileExecution {
  string target_incarnation_id = 1;
  string cell_ref = 2;
  string cell_snapshot_digest = 3;
  string contract_digest = 4;
}

enum OutputMode {
  OUTPUT_MODE_UNSPECIFIED = 0;
  OUTPUT_MODE_URL         = 1; // upload media, return refs (default behavior)
  OUTPUT_MODE_INLINE      = 2; // small outputs inline in the result payload
}

// Resolved hardware for this invocation: accelerator gates the worker's GPU
// semaphore; gpu_index binds the CUDA context. pgw#526 cut gpu_count/vram_gb
// (and the ctx.compute org surface they fed): documented and plumbed
// through every dispatch, read by zero endpoints. Reserved so the numbers
// can't come back with different semantics.
message ResolvedCompute {
  reserved 3, 4;
  reserved "gpu_count", "vram_gb";
  string accelerator = 1; // "cuda" | "none"
  int32  gpu_index   = 2; // 0-based GPU ordinal picked by the per-GPU slot scheduler
}

message ModelBinding {
  string slot = 1; // model slot name declared by the endpoint
  string ref  = 2; // canonical ref string (tag/flavor/digest encoded in the ref grammar)
  // Per-request LoRA overlays riding this slot's base model (gw#393 BYOM).
  // Applied as unfused named adapters for the duration of the job and
  // removed after. Overlay refs are ordinary tensorhub-CAS refs — the hub
  // resolves them and attaches presigned snapshots in RunJob.snapshots;
  // workers never fetch upstream. Additive: old workers ignore this field.
  repeated LoraOverlay loras = 3;
  // th#767: the resolved repo's family-typed inference defaults/constraints,
  // JSON-encoded ("" = none set). Schema is per-family and versioned
  // hub-side (internal/modelfamily/inferencedefaults); pgw#520 CONTRACT.md
  // documents this exact field name for the SDK's resolution chain
  // (precedence: explicit payload value > this > endpoint fallback preset).
  // Additive: old workers ignore this field.
  string inference_defaults = 4;
  // th#980 hierarchical slots: per-component repo substitutions on the base
  // composition, component name -> canonical tensorhub ref (normal form,
  // same grammar as `ref`). The worker loads the base composition then
  // substitutes each named component from its materialized snapshot (pgw
  // companion issue). Snapshots for these refs ride RunJob.snapshots /
  // DesiredResidency exactly like base refs. Additive: old workers ignore.
  map<string, string> components = 5;
}

// One LoRA adapter overlay: a resolved tensorhub ref + its adapter weight.
message LoraOverlay {
  string ref    = 1; // canonical tensorhub ref of the adapter snapshot
  double weight = 2; // adapter scale; hub validates to [-4, 4], worker mirror-checks
  // th#767b / pgw#516: THIS LoRA's own family-typed inference-defaults/
  // recipe-opinion object, JSON-encoded ("" = none set) — an instance of
  // the family's LORA-kind vocabulary struct (gen_worker.families
  // `@family(name, kind="lora")`, validated hub-side against
  // `<root>.lora.schema.json`, internal/modelfamily/inferencedefaults).
  // Consumer: the SDK's `ctx.slots[slot].defaults` resolution chain applies
  // this object's non-null fields as FIELD-LEVEL overrides on the
  // checkpoint's resolved recipe, in lora order (later loras win on a
  // shared field) — NOT the whole-object repo-metadata-over-fallback
  // precedence `ModelBinding.inference_defaults` uses. Additive: old
  // workers ignore this field.
  string inference_defaults = 3;
}

// A pinned tensorhub repo snapshot with presigned download URLs. The worker
// never calls tensorhub for ref resolution; the orchestrator is the only
// resolver and ships snapshots on DesiredResidency / RunJob.
message Snapshot {
  string digest = 1; // snapshot digest the download is pinned to
  repeated SnapshotFile files = 2;
}

message SnapshotFile {
  string path       = 1;
  int64  size_bytes = 2;
  string blake3     = 3; // content hash the worker verifies after download
  string url        = 4; // presigned GET
}

// Worker -> orchestrator: dispatch acknowledged; the worker now owns
// (request_id, attempt). Stops orchestrator retransmission.
message JobAccepted {
  string request_id = 1;
  int64  attempt    = 2;
}

// Worker -> orchestrator terminal outcome. Exactly one per accepted
// (request_id, attempt). Never dropped: buffered and resent across reconnects.
message JobResult {
  string request_id = 1;
  int64  attempt    = 2;
  JobStatus status  = 3;
  // Result payload (MessagePack-encoded output struct) when status = OK.
  // Inline when small; blob_ref (uploaded via presigned PUT) above the
  // inline threshold (~64KB).
  oneof output {
    bytes  inline   = 4;
    string blob_ref = 5;
  }
  string safe_message = 6; // sanitized client-facing error text; empty when OK
  JobMetrics metrics = 7;
}

enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  JOB_STATUS_OK          = 1;
  JOB_STATUS_INVALID     = 2; // bad input; never retry
  JOB_STATUS_RETRYABLE   = 3; // transient; orchestrator may requeue (bumping attempt)
  JOB_STATUS_FATAL       = 4; // permanent execution failure; do not retry
  JOB_STATUS_CANCELED    = 5; // terminal ack of CancelJob (or local deadline abort)
}

// The one metrics vehicle. Worker-observed values only; the orchestrator
// enriches with its own state (release, function, machine class) off-wire.
message JobMetrics {
  int64 runtime_ms     = 1; // handler start -> handler completion
  int64 queue_ms       = 2; // worker-local queue wait before start
  // Host RSS sampled at job completion (NOT a per-job peak: the OS gives no
  // per-process peak-RSS reset, so this is an honest instantaneous reading,
  // not a high-water mark — pgw#513). 0 = unmeasured.
  int64 rss_at_end_bytes = 3;
  // Peak VRAM during execution. torch.cuda.reset_peak_memory_stats() runs at
  // handler start (GPU jobs serialize under the worker's GPU semaphore, so
  // this IS a true per-job peak — pgw#513). 0 = unmeasured.
  int64 peak_vram_bytes = 4;
  int32 concurrency_at_start = 5; // jobs already active on the worker at admit
  // Summed MEDIA seconds of the media assets in the job's output (e.g.
  // VideoAsset.duration_s probed at save time). 0 = no media duration
  // reported. The ONLY billing source for per_output_second settlement
  // (th#572) — settlement must fail closed rather than fall back to
  // runtime_ms wall-clock.
  double output_media_duration_s = 6;
  // Typed billing usage (pgw#512) — the ONLY settlement source for
  // per_million_tokens/per_output pricing. Settlement must read these, never
  // scavenge the (possibly blob-ref'd, org-controlled) result payload.
  int64 input_tokens = 7;
  int64 input_cached_tokens = 8;
  int64 output_tokens = 9;
  int64 output_count = 10; // count of generated output Assets (images/videos/audios/files)
  // gw#516 pipelined finalize split of runtime_ms. slot_held_ms is how long
  // the job actually held the GPU slot (acquire -> terminal release);
  // finalize_wall_ms is the slotless encode/upload tail that overlapped the
  // next request's compute. slot_held_ms + finalize_wall_ms ~= runtime_ms
  // for GPU jobs. Both 0 = unmeasured (CPU job, or a pre-gw#516 worker).
  int64 slot_held_ms = 11;
  int64 finalize_wall_ms = 12;
  // th#913/gw#596: the CONCRETE lane that actually served this request
  // (e.g. "fp8-w8a8-dynamic+compiled"). "" = unmeasured (pre-lane worker).
  string lane = 13;
  // th#1051: the declared runtime formula's term feature values, evaluated
  // worker-side on the EXECUTED payload (defaults applied), keyed by
  // canonical term key (e.g. "num_inference_steps", "1"). Empty = no
  // declared formula (or a pre-formula worker) — the hub falls back to
  // evaluating terms from the raw payload + schema defaults.
  map<string, double> runtime_terms = 14;
}

// Worker -> orchestrator streaming output chunk. Ordered per (request_id,
// attempt); fanned out to attached SSE/wait subscribers, never persisted.
message JobProgress {
  string request_id = 1;
  int64  attempt    = 2;
  int64  seq        = 3; // starts at 1, strictly increasing per (request_id, attempt)
  bytes  data       = 4; // chunk bytes: UTF-8 text delta, JSON delta, or raw audio
  string content_type = 5; // e.g. "text/plain", "application/json", "audio/pcm;rate=24000"
}

// Orchestrator -> worker: abort (request_id, attempt). Worker answers with
// JobResult{status: CANCELED} (or the natural terminal result if it raced).
message CancelJob {
  string request_id = 1;
  int64  attempt    = 2;
}

// ---------------------------------------------------------------------------
// Models
// ---------------------------------------------------------------------------

// Orchestrator -> worker compile-cache adoption command. Ordinary model
// residency is declared through HelloAck.desired_residency.
message ModelOp {
  ModelOpKind op = 1;
  string ref = 2;
  // Presigned compile-cache snapshot.
  Snapshot snapshot = 3;
  // Orchestrator-minted causal identity for one hot-adoption attempt. Workers
  // echo it on its ADOPTED/adopt-FAILED terminal and retain it for at most one
  // later causal compiled-runtime FAILED. It is deliberately distinct from
  // the snapshot digest: retries may target identical bytes.
  string operation_id = 4;
  // Exact READY CompileTarget to mutate. Required for ADOPT_COMPILE_CACHE;
  // family/ref fallback is forbidden.
  string target_incarnation_id = 5;
}

enum ModelOpKind {
  MODEL_OP_KIND_UNSPECIFIED = 0;
  reserved 1, 2, 3;
  reserved "MODEL_OP_KIND_DOWNLOAD", "MODEL_OP_KIND_LOAD", "MODEL_OP_KIND_UNLOAD";
  // Hot-adopt a torch.compile cache artifact: ref is a compile-cache flavor
  // ref (`root/family-<f>#inductor-<sku>-torch<maj.min>`). The worker
  // downloads+verifies+seeds the cache, re-wraps the already-resident modules
  // of endpoints declaring compile family <f>, runs one warmup trace, and
  // answers ModelEvent{ADOPTED, duration_ms}. ANY failure => stay eager and
  // answer ModelEvent{FAILED, error:"adopt_failed:<reason>"}. Sent only to
  // job-idle workers. Workers predating this kind ignore it silently (no
  // ModelEvent), which the orchestrator treats as not-adopted.
  MODEL_OP_KIND_ADOPT_COMPILE_CACHE = 4;
}

// Worker -> orchestrator model residency transition. The single channel for
// download progress, load/unload outcomes, VRAM footprints, and evictions —
// whether triggered by desired reconciliation, compile-cache adoption, or the
// worker's own cache policy.
message ModelEvent {
  string ref = 1;
  ModelState state = 2;
  int64 vram_bytes = 3;  // measured VRAM footprint; set when state = IN_VRAM
  string error = 4;      // set when FAILED (e.g. "oom", "url_expired", initial "adopt_failed:<reason>", later causal "adopt_failed:runtime_guard")
  int64 bytes_done = 5;  // download progress; set while state = DOWNLOADING
  int64 bytes_total = 6; // set while state = DOWNLOADING (0 = unknown)
  int64 duration_ms = 7; // op wall time; set when state = ADOPTED
  // Adoption observability (gw#391), set when state = ADOPTED for inductor
  // cells: FX-graph cache hits/misses observed during the adoption warmup and
  // the warmup wall seconds. A warmup observing ZERO hits never reports
  // ADOPTED - it rolls back to eager and reports adopt_failed:cache_miss; an
  // endpoint without warmup() cannot prove the cell and reports
  // adopt_failed:no_warmup. hits>0 with misses>0 = partial shape coverage.
  int64 cache_hits = 8;
  int64 cache_misses = 9;
  double warmup_s = 10;
  // Typed host-RAM admission evidence (pgw#548). Set on
  // FAILED{error:"insufficient_host_ram"} and HOST_CAPACITY_PROGRESS only.
  // A progress event's generation is strictly newer than the matching
  // failure, and available_after_bytes satisfies required_bytes. The worker
  // emits progress only after an observed owner/pin release increased
  // measured headroom; elapsed time alone never produces this event.
  int64 host_ram_required_bytes = 11;
  int64 host_ram_available_before_bytes = 12;
  int64 host_ram_available_after_bytes = 13;
  repeated string host_ram_evicted_refs = 14;
  // Monotonic only within one worker process. Consumers fence within the
  // active Connect stream and reset that fence when a new Hello re-baselines
  // the worker; same-process reconnects replay only satisfying generations
  // whose successful stream.write delivery has not completed yet.
  uint64 host_ram_capacity_generation = 15;
  // Immutable bytes and DesiredResidency generation for this ref transition.
  // A receiver must treat an empty digest or zero generation as identity
  // unknown. Generation fences delayed events after a tag moves or a newer
  // desired replacement is reconciled without changing protocol version 4.
  string snapshot_digest = 16;
  uint64 residency_generation = 17;
  // Echoes ModelOp.operation_id on ADOPTED/adopt-FAILED and at most one later
  // causal compiled-runtime FAILED. Empty on boot-attached cells and ordinary
  // snapshot/download/residency events.
  string operation_id = 18;
  // Echoes ModelOp.target_incarnation_id on ADOPTED/adopt-FAILED and at most
  // one later causal compiled-runtime FAILED; empty on boot-attached cells and
  // ordinary model events.
  string target_incarnation_id = 19;
  // th#850: cumulative bytes actually fetched over the network (the public
  // R2 source, never a local/volume CAS hit) for this DOWNLOADING operation.
  // Monotonically non-decreasing within one operation, same cadence as
  // bytes_done; set on progress events and the last one before completion is
  // authoritative. This is the minimal worker-side signal the "volume-
  // attached boot with warm blobs ⇒ R2 bytes ≈ 0" runtime assertion needs —
  // distinct from bytes_done/bytes_total, which count ALL bytes materialized
  // (including cache hits, both local disk and volume-backed CAS roots).
  int64 network_bytes = 20;
}

enum ModelState {
  MODEL_STATE_UNSPECIFIED = 0;
  MODEL_STATE_DOWNLOADING = 1; // fetch in progress; may repeat with progress
  MODEL_STATE_ON_DISK     = 2; // bytes local; not resident in RAM or VRAM
  MODEL_STATE_IN_RAM      = 3; // weights host-RAM resident (fast VRAM promote)
  MODEL_STATE_IN_VRAM     = 4; // hot; ready for inference
  MODEL_STATE_EVICTED     = 5; // removed from disk entirely
  MODEL_STATE_FAILED      = 6; // last op on this ref failed; residency unchanged
  MODEL_STATE_ADOPTED     = 7; // compile-cache ref adopted in place (not a residency tier)
  // Measured host headroom now satisfies this ref's remembered failed
  // requirement after owner/pin release. Not a residency tier.
  MODEL_STATE_HOST_CAPACITY_PROGRESS = 8;
}

// ---------------------------------------------------------------------------
// Worker activity (th#929 / gw#601)
// ---------------------------------------------------------------------------

// Worker -> orchestrator: generic progress for the worker's current internal
// job (self-mint compile, warmup, ...). Liveness contract: while an activity
// RUNS the worker keeps seq advancing — phase transitions, step advances, or
// watchdog heartbeats — and the hub enforces ONE generic stall rule on
// silence; there are no per-activity wall-clock budgets. A silent death is a
// bug by contract: terminal FAILED carries the exception. Model downloads
// keep their richer ModelEvent byte shape; the hub folds them into the same
// last-progress store. Additive proto3 oneof field: old hubs ignore it.
message ActivityUpdate {
  string kind  = 1; // "self_mint_compile" | "warmup" | ...
  string phase = 2; // e.g. "load", "inductor_compile", "warmup_forward", "seal_publish"
  int64 step        = 3; // k in "phase k/K"; 0 = not stepwise
  int64 total_steps = 4; // K; 0 = unknown
  // Monotonic per worker process across all activities. The hub records
  // last-progress on every increase; heartbeats bump it without changing
  // phase/step.
  uint64 seq = 5;
  ActivityState state = 6;
  string error  = 7; // set when state = FAILED (the typed activity_failed terminal)
  string detail = 8; // human-readable elaboration
  int64 updated_at_unix_ms = 9; // worker clock, informational; hub stamps receipt

  // gw#621/th#994: progress-registry snapshot riding the worker's 10s app
  // beat. A named monotonic counter for the current phase (download bytes,
  // watchdog evidence, warmup jobs, upload bytes). When a counter is
  // present the hub judges liveness by counter ADVANCEMENT — a heartbeat
  // with a frozen counter is not progress. Counterless updates keep
  // seq-freshness semantics (old workers). Additive: old hubs ignore.
  string counter       = 10; // name; family prefix before ":" maps to a patience window
  string counter_unit  = 11; // bytes | steps | graphs | evidence
  double counter_done  = 12; // monotonic within one counter name
  double counter_total = 13; // 0 = unknown
  double rate_per_s    = 14; // worker-computed recent rate, display only
  // Self-diagnosis (kill on confession, gw#621): the worker's own per-phase
  // window saw no counter advance for stalled_for_ms; the hub recycles the
  // pod without waiting out its own stall window.
  bool  self_stalled   = 15;
  int64 stalled_for_ms = 16;
}

enum ActivityState {
  ACTIVITY_STATE_UNSPECIFIED = 0;
  ACTIVITY_STATE_RUNNING     = 1;
  ACTIVITY_STATE_COMPLETED   = 2;
  ACTIVITY_STATE_FAILED      = 3;
}

// ---------------------------------------------------------------------------
// Availability / drain
// ---------------------------------------------------------------------------

// Worker -> orchestrator: this worker self-disables ONE function on itself
// because a hardware gate failed or its model download / pipeline setup
// failed terminally. Cleared implicitly by the next Hello, or by the
// function reappearing in StateDelta.available_functions.
message FnUnavailable {
  string function_name = 1;
  // reason vocabulary: compute_capability_unmet, insufficient_vram,
  // missing_cuda_library, insufficient_disk, cuda_unavailable, setup_failed.
  string reason = 2;
  string detail = 3; // human-readable elaboration for the admin availability view
  map<string, string> axes = 4; // e.g. {detected_sm: "8.9", required_sm: "10.0"}
}

// Worker -> orchestrator: this worker DOES serve function_name, but degraded —
// not at the release's native quality/speed on this card (th#683 P3 serve-time
// adaptive fit). Emitted once per connection per degraded function after
// hardware gating; re-emitted on reconnect. Observational placement signal:
// "this release degraded on this card, it wants a bigger one". Additive
// proto3 oneof field: older orchestrators ignore it silently.
message FnDegraded {
  string function_name = 1;
  string wanted = 2; // what the function declares (stored flavor, or "bf16")
  string ran = 3;    // how it actually runs: fp8_storage | emergency_quant | offload | cpu
  string reason = 4; // honest-guidance detail, incl. a better-flavor hint when one exists
  double est_latency_multiplier = 5; // realistic slowdown vs a native run
  double recommended_vram_gb = 6;    // ideal card size for a native run; 0 = unknown
}

// Orchestrator -> worker: stop accepting work, finish in-flight jobs, ship
// results, close the stream, exit. No reply message; stream close is the ack.
message Drain {
  int64 deadline_ms = 1; // relative grace budget; 0 waits without a lifecycle deadline
}

// ---------------------------------------------------------------------------
// Credential rotation
// ---------------------------------------------------------------------------

// Orchestrator -> worker: a renewed worker JWT, pushed at ~80% of the current
// token's TTL (kubelet-style rotation). The worker replaces its stored
// credential immediately: the live connection is unaffected (identity is per
// connection) and every subsequent reconnect dials with the newest pushed
// token. No reply message. Additive proto3 field: a worker that predates this
// message ignores it (unknown oneof field) and keeps its boot-time token.
message TokenRefresh {
  string token = 1;           // replacement worker JWT
  int64  expires_at_unix = 2; // exp claim of the replacement (observability)
}
