version: '3'
dotenv: ['.env']

tasks:
  build:
    desc: Build package
    cmds:
      - rm -rf dist/
      - uv build

  publish:
    desc: Publish to PyPI (uses UV_PUBLISH_TOKEN from .env)
    deps: [build]
    cmds:
      - sh -c 'unset UV_PUBLISH_USERNAME; uv publish'

  proto:
    desc: Regenerate src/gen_worker/pb/ from proto/ (grpcio-tools codegen)
    cmds:
      - >-
        uv run --extra dev python -m grpc_tools.protoc
        -Iproto
        --python_out=src/gen_worker/pb
        --grpc_python_out=src/gen_worker/pb
        --pyi_out=src/gen_worker/pb
        proto/worker_scheduler.proto

  lint:
    desc: Type check (mypy) + lint (ruff)
    # Both carry pre-existing advisory debt (matched by continue-on-error in CI):
    # they run independently and report, so neither masks the other. Tighten to
    # hard gates once the dead-code sweeps + v2 rewrites land.
    cmds:
      - cmd: uv run --extra dev mypy src/gen_worker
        ignore_error: true
      - cmd: uv run --extra dev ruff check src/gen_worker
        ignore_error: true
      # Hard gate (matches CI): gw#467 HTTP timeout guard.
      - cmd: uv run python scripts/lint_http_timeouts.py

  test:
    desc: Run tests
    cmds:
      - uv run --extra dev pytest tests/
